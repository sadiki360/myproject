{% extends 'base.html' %}
{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col"><h3 class="page-title">Congés & Vacances</h3></div>
                <div class="col-auto float-right ml-auto">
                    <a href="{% url 'add_holiday' %}" class="btn btn-primary"><i class="fas fa-plus"></i></a>
                </div>
            </div>
        </div>
        <div class="row">
            {% for holiday in holidays %}
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>{{ holiday.name }}</h5>
                        <p><strong>Date:</strong> {{ holiday.date }}</p>
                        <p>{{ holiday.description }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}

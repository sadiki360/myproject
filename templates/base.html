<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PreSkool - Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { width: 250px; position: fixed; height: 100%; background: #3d5ee1; color: white; padding: 20px; }
        .main-content { margin-left: 260px; padding: 20px; }
        .sidebar a { color: white; display: block; padding: 10px; text-decoration: none; }
        .sidebar a:hover { background: #2e44a5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>PreSkool</h3>
        <hr>
        <a href="{% url 'dashboard' %}">🏠 Dashboard</a>
        <a href="{% url 'student_list' %}">🎓 Étudiants</a>
        <a href="{% url 'teacher_list' %}">👨‍🏫 Enseignants</a>
        <a href="{% url 'department_list' %}">🏢 Départements</a>
        <a href="{% url 'subject_list' %}">📚 Matières</a>
        <a href="{% url 'holiday_list' %}">📅 Vacances</a>
        <a href="{% url 'exam_list' %}">📝 Examens</a>
        <a href="{% url 'timetable' %}">🗓️ Emploi du Temps</a>
        <hr>
        <a href="{% url 'logout' %}">🚪 Déconnexion</a>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>

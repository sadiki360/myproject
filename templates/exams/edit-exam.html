{% extends 'base.html' %}
{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Modifier l'Examen</h3>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Nom de l'Examen</label>
                                <input type="text" name="name" class="form-control" value="{{ exam.name }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Matière</label>
                                <select class="form-control" name="subject">
                                    {% for sub in subjects %}
                                    <option value="{{ sub.id }}" {% if sub.id == exam.subject.id %}selected{% endif %}>
                                        {{ sub.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Date de l'Examen</label>
                                <input type="date" name="exam_date" class="form-control" value="{{ exam.exam_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Note Totale</label>
                                <input type="number" name="total_marks" class="form-control" value="{{ exam.total_marks }}">
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Sauvegarder</button>
                            <a href="{% url 'exam_list' %}" class="btn btn-secondary">Retour</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
